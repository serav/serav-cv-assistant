spring.application.name=flowmetrix-ai-chat
#
spring.datasource.url=jdbc:postgresql://localhost:5432/flowmetrix
spring.datasource.username=myuser
spring.datasource.password=mypass
#
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

#
spring.threads.virtual.enabled=true
#

#using the GitHub Models endpoint (models.inference.ai.azure.com) instead of OpenAI,

spring.ai.openai.base-url=https://models.inference.ai.azure.com
spring.ai.openai.api-key=${API-KEY}
spring.ai.openai.chat.options.model=gpt-4.1-mini
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.openai.embedding.embeddings-path=/embeddings

#
vaadin.productionMode=false
vaadin.frontend.hotdeploy=true
